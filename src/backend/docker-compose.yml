version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: unihub-postgres
    environment:
      POSTGRES_USER: unihub
      POSTGRES_PASSWORD: unihub_secret
      POSTGRES_DB: unihub_workshop
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../data/init_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./migrations/002_seed_data.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unihub -d unihub_workshop"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: unihub-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: unihub-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: unihub-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
