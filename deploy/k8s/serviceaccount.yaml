# ============================================
# SERVICE ACCOUNTS — Workload Identity Binding
# ============================================
# Liên kết K8s Service Account → GCP Service Account
# để Pods có thể truy cập Secret Manager, Cloud SQL, v.v.
# mà không cần lưu JSON key file.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: unihub-api
  namespace: unihub
  annotations:
    # Workload Identity: liên kết với GCP SA đã tạo trong iam.tf
    iam.gke.io/gcp-service-account: unihub-workload@YOUR_PROJECT_ID.iam.gserviceaccount.com
  labels:
    app.kubernetes.io/name: unihub
    app.kubernetes.io/component: api

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: unihub-worker
  namespace: unihub
  annotations:
    iam.gke.io/gcp-service-account: unihub-workload@YOUR_PROJECT_ID.iam.gserviceaccount.com
  labels:
    app.kubernetes.io/name: unihub
    app.kubernetes.io/component: worker
